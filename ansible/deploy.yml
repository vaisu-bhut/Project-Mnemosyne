---
- name: Deploy Backend Services
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Wait for server to finish booting
      wait_for_connection:
        timeout: 300
        delay: 5

    - name: Gather facts
      setup:

    - name: Update apt cache and install basic tools
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - rsync
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker APT repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Install Docker and Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure project directory exists
      file:
        path: /opt/mnemosyne
        state: directory
        owner: root
        group: root

    - name: Copy source archive to server
      copy:
        src: "{{ playbook_dir }}/../code.tar.gz"
        dest: /opt/mnemosyne/code.tar.gz

    - name: Extract archive and spin up containers
      shell: |
        cd /opt/mnemosyne
        tar -xzf code.tar.gz
        docker compose up -d --build
