name: Continuous Integration

on:
  push:
    branches:
      - '**' # Runs on all branches
  pull_request:
    branches:
      - '**'

jobs:
  ci:
    name: Test & Security
    runs-on: ubuntu-latest

    services:
      postgres:
        # Use pgvector since your project requires it
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mnemosyne
          POSTGRES_PASSWORD: mnemosyne
          POSTGRES_DB: mnemosyne
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        working-directory: ./services
        run: cp .env.example .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Install dependencies
        working-directory: ./services
        run: pnpm install --frozen-lockfile

      - name: Run Typecheck (Linting)
        working-directory: ./services
        run: pnpm typecheck

      - name: Run Unit Tests
        working-directory: ./services
        run: pnpm test

      - name: Security Vulnerability Scan
        working-directory: ./services
        # We run the audit but allow it to pass even if it finds vulnerabilities
        # so it doesn't block your hackathon deployment over minor dependency warnings.
        run: pnpm audit --audit-level high || true
